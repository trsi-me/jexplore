# نشر Flutter Web على Render كـ Static Site — نسخة جاهزة من جهازك (بدون بناء على السيرفر)
#
# قبل كل push للنشر:
#   flutter build web --release
# ثم ادفع المستودع مع مجلد build/web (يجب أن يكون مضافاً لـ Git وليس مستبعداً في .gitignore)
#
# في لوحة Render: Static Site أو Blueprint من هذا الملف.
# https://render.com/docs/static-sites

services:
  - type: web
    name: jexplore-web
    runtime: static
    rootDir: .
    # لا يوجد Flutter هنا — مجرد نجاح خطوة البناء ثم نشر المجلد التالي
    buildCommand: echo "OK — serving pre-built Flutter web from build/web"
    staticPublishPath: build/web
